name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * 0" # Runs automatically every Sunday at midnight
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Check out your repository using your secure PAT token
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # Step 2: Generate the core Global Stats card
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_title=true&show_icons=true&theme=gotham&include_all_commits=true&count_private=true
          path: profile-stats.svg
          token: ${{ secrets.PAT_TOKEN }}

      # Step 3: Generate the Top Languages card
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=gotham&hide=html,css
          path: profile-langs.svg
          token: ${{ secrets.PAT_TOKEN }}

      # Step 4: Commit the newly generated SVG images back into your repo
      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile-stats.svg profile-langs.svg
          git commit -m "chore: update profile stats cards" || exit 0
          git push
